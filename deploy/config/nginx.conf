server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all Signet API calls through nginx so the browser sees one origin.
    # This avoids CORS entirely — cop-ui JS uses relative paths (/signet/...).
    location /signet/ {
        proxy_pass         http://signet:4774;
        proxy_http_version 1.1;
        # Required for SSE and chunked streaming (SIG-003, SIG-010)
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_buffering    off;
        proxy_cache        off;
        # Allow long-lived SSE / FMV streaming connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # Demo control sidecar — restart mission, change speed
    location /demo/ {
        proxy_pass         http://drone-sim:8092;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 10s;
    }

    # FMV stream proxy — rewrites /fmv/<path>?token=<jwt> to
    # /signet/stream/fmv/<path> with Authorization header injected.
    # mpegts.js runs in a Web Worker and cannot set custom request headers,
    # so the browser passes the JWT as a query param here instead.
    location /fmv/ {
        rewrite ^/fmv/(.*)$ /signet/stream/fmv/$1 break;
        proxy_pass         http://signet:4774;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   Authorization     "Bearer $arg_token";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
